version: "3.9"

services:
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:              ${VITE_API_URL:-http://localhost:4000}
        VITE_COGNITO_USER_POOL_ID: ${VITE_COGNITO_USER_POOL_ID:-us-east-1_placeholder}
        VITE_COGNITO_CLIENT_ID:    ${VITE_COGNITO_CLIENT_ID:-placeholder}
        VITE_AWS_REGION:           ${AWS_REGION:-us-east-1}
    ports:
      - "3000:80"
    depends_on:
      - localstack
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout:  5s
      retries:  3
    restart: unless-stopped

  # ── LocalStack (emulates AWS Free Tier services locally) ───────────────────
  localstack:
    image: localstack/localstack:3.4
    ports:
      - "4566:4566"
    environment:
      SERVICES:        "dynamodb,s3,cognito-idp,apigateway,lambda,logs,sns,cloudwatch"
      DEBUG:           0
      LAMBDA_EXECUTOR: local
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID:     test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 30s

volumes:
  localstack_data:
    driver: local
